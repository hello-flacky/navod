<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Happy Birthday Navod!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="confetti" class="particles"></canvas>

    <div class="container">
        <div class="header">
            <div class="greeting">HELLO THERE</div>
            <div class="name">Here is Bashiniii</div>
        </div>

        <div class="bday-container">
            <div class="happy-text">Happy</div>
            <div class="birthday-text">BIRTHDAY</div>
            <div class="to-you-text">To you</div>
            <div class="navod-text">Navod</div>
            
            <span class="kiss k1">💋</span>
            <span class="kiss k2">💋</span>
            <span class="kiss k3">💋</span>
            <span class="heart h1">❤</span>
        </div>

        <div class="footer">
            <p class="question">Do you want to see your birthday wish???</p>
            <div class="btn-group">
                <button class="btn btn-yes" id="btnYes">Yes Please</button>
                <button class="btn btn-no" id="btnNo">No Thanks</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
