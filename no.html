<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Oh no...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            overflow: hidden;
        }
        .sad-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            min-height: -webkit-fill-available;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }
        .panda-img {
            max-width: 300px;
            width: 100%;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            animation: sob 2.5s ease-in-out infinite;
        }
        @keyframes sob {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(5px) scale(0.97); }
        }
        .sad-text {
            font-size: 1.5rem;
            color: var(--text-brown);
            line-height: 1.5;
            max-width: 400px;
            font-weight: 600;
            opacity: 0;
            animation: fadeInText 2s ease forwards 0.5s;
        }
        .btn-back {
            margin-top: 2rem;
            padding: 1rem 2.5rem;
            background: var(--text-brown);
            color: var(--bg-cream);
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(74, 53, 37, 0.2);
            opacity: 0;
            animation: fadeInText 2s ease forwards 1.5s;
        }
        .btn-back:hover {
            transform: scale(1.05) translateY(-2px);
            background: #362418;
            box-shadow: 0 6px 15px rgba(74, 53, 37, 0.3);
        }
        @keyframes fadeInText {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Raindrops */
        .rain {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .drop {
            position: absolute;
            width: 2px;
            height: 20px;
            background: rgba(74, 53, 37, 0.2);
            border-radius: 50%;
            animation: fall linear infinite;
        }
        @keyframes fall {
            from { transform: translateY(-20px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            to { transform: translateY(100vh); opacity: 0; }
        }
        @media (max-width: 500px) {
            .sad-text { font-size: 1.2rem; }
            .panda-img { max-width: 250px; }
            .btn-back { padding: 0.8rem 2rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="rain" id="rain"></div>
    <div class="sad-container">
        <img src="assets/panda.jpeg" alt="Sad Panda" class="panda-img">
        <p class="sad-text">Look what you did!<br>You made the panda cry... Now I'll be sobbing all day!</p>
        <a href="index.html" class="btn-back">Go back and say Yes!</a>
    </div>
    
    <script>
        // Create rain drops
        const rainContainer = document.getElementById('rain');
        for (let i = 0; i < 40; i++) {
            let drop = document.createElement('div');
            drop.classList.add('drop');
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = Math.random() * 1 + 0.5 + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            rainContainer.appendChild(drop);
        }
    </script>
</body>
</html>
