<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stuck in my head</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            position: fixed;
            overscroll-behavior: none;
        }

        .fullscreen-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background-image: url('assets/couple.jpeg');
            background-size: cover;
            background-position: center;
            opacity: 0;
            -webkit-animation: fadeInImage 4s ease forwards, infiniteZoom 30s linear infinite alternate 4s;
            animation: fadeInImage 4s ease forwards, infiniteZoom 30s linear infinite alternate 4s;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.1) 100%);
            z-index: 2;
            opacity: 0;
            -webkit-animation: fadeInImage 4s ease forwards 1s;
            animation: fadeInImage 4s ease forwards 1s;
        }

        .content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 5rem;
            color: #fff;
        }

        .title {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            margin: 0 0 2rem 0;
            opacity: 0;
            -webkit-animation: slideUpFade 2s ease forwards 1.5s, titleBreathe 4s ease-in-out infinite alternate 3.5s;
            animation: slideUpFade 2s ease forwards 1.5s, titleBreathe 4s ease-in-out infinite alternate 3.5s;
            text-align: center;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 1rem 3rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            opacity: 0;
            -webkit-animation: slideUpFade 2s ease forwards 2.5s;
            animation: slideUpFade 2s ease forwards 2.5s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
        }

        /* Hidden YouTube Player */
        .yt-audio {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        @-webkit-keyframes fadeInImage {
            from { opacity: 0; -webkit-transform: scale(1.05); transform: scale(1.05); }
            to { opacity: 1; -webkit-transform: scale(1); transform: scale(1); }
        }
        @keyframes fadeInImage {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }

        @-webkit-keyframes slideUpFade {
            from { opacity: 0; -webkit-transform: translateY(30px); transform: translateY(30px); }
            to { opacity: 1; -webkit-transform: translateY(0); transform: translateY(0); }
        }
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @-webkit-keyframes infiniteZoom {
            from { -webkit-transform: scale(1); transform: scale(1); }
            to { -webkit-transform: scale(1.2); transform: scale(1.2); }
        }
        @keyframes infiniteZoom {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        @-webkit-keyframes titleBreathe {
            from { text-shadow: 0 4px 15px rgba(0,0,0,0.8); -webkit-transform: translateY(0); transform: translateY(0); }
            to { text-shadow: 0 4px 30px rgba(255, 255, 255, 0.4), 0 4px 15px rgba(0,0,0,0.8); -webkit-transform: translateY(-8px); transform: translateY(-8px); }
        }
        @keyframes titleBreathe {
            from { text-shadow: 0 4px 15px rgba(0,0,0,0.8); transform: translateY(0); }
            to { text-shadow: 0 4px 30px rgba(255, 255, 255, 0.4), 0 4px 15px rgba(0,0,0,0.8); transform: translateY(-8px); }
        }

        /* Play hint */
        .play-hint {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 1.2rem 2.5rem;
            border-radius: 50px;
            font-size: 1.1rem;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            -webkit-animation: pulseHint 2s infinite;
            animation: pulseHint 2s infinite;
        }
        
        .play-hint.visible {
            opacity: 1;
            pointer-events: auto;
        }

        @-webkit-keyframes pulseHint {
            0%, 100% { -webkit-transform: translate(-50%, -50%) scale(1); transform: translate(-50%, -50%) scale(1); }
            50% { -webkit-transform: translate(-50%, -50%) scale(1.05); transform: translate(-50%, -50%) scale(1.05); }
        }
        @keyframes pulseHint {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        .vanish-anim {
            -webkit-animation: floatAway 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
            animation: floatAway 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
            pointer-events: none !important;
        }

        @-webkit-keyframes floatAway {
            0% { -webkit-transform: translate(-50%, -50%) scale(1); transform: translate(-50%, -50%) scale(1); opacity: 1; }
            20% { -webkit-transform: translate(-50%, -50%) scale(1.08); transform: translate(-50%, -50%) scale(1.08); opacity: 1; text-shadow: 0 0 15px rgba(255,255,255,0.8); }
            100% { -webkit-transform: translate(-50%, -150%) scale(0.8); transform: translate(-50%, -150%) scale(0.8); opacity: 0; filter: blur(10px); }
        }
        @keyframes floatAway {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            20% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; text-shadow: 0 0 15px rgba(255,255,255,0.8); }
            100% { transform: translate(-50%, -150%) scale(0.8); opacity: 0; filter: blur(10px); }
        }

        /* Music Player Widget */
        .music-widget {
            position: absolute;
            top: 2.5rem;
            right: 2.5rem;
            background: rgba(20, 20, 20, 0.45);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            padding: 1rem;
            border-radius: 16px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            opacity: 0;
            -webkit-animation: fadeInImage 2s ease forwards 2.5s;
            animation: fadeInImage 2s ease forwards 2.5s;
        }

        .album-cover {
            width: 130px;
            height: 130px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }

        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .playing-bars {
            position: absolute;
            bottom: 10px;
            left: 10px;
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 18px;
            background: rgba(0,0,0,0.4);
            padding: 4px 6px;
            border-radius: 6px;
            backdrop-filter: blur(4px);
        }

        .bar {
            width: 4px;
            background: #fff;
            border-radius: 2px;
            -webkit-animation: bounceBar 1s infinite alternate;
            animation: bounceBar 1s infinite alternate;
            transform-origin: bottom;
        }

        .bar1 { height: 10px; -webkit-animation-delay: 0.1s; animation-delay: 0.1s; }
        .bar2 { height: 16px; -webkit-animation-delay: 0.3s; animation-delay: 0.3s; }
        .bar3 { height: 12px; -webkit-animation-delay: 0.2s; animation-delay: 0.2s; }

        @-webkit-keyframes bounceBar {
            0% { -webkit-transform: scaleY(0.2); transform: scaleY(0.2); }
            100% { -webkit-transform: scaleY(1); transform: scaleY(1); }
        }
        @keyframes bounceBar {
            0% { transform: scaleY(0.2); }
            100% { transform: scaleY(1); }
        }

        .song-info {
            margin-top: 1rem;
            text-align: center;
        }

        .song-title {
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .song-artist {
            color: rgba(255,255,255,0.85);
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 0.9rem;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        @media (max-width: 500px) {
            .title { font-size: 3.5rem; }
            .content { padding-bottom: 4rem; }
            .music-widget {
                top: 1.5rem;
                right: 1.5rem;
                padding: 0.8rem;
            }
            .album-cover {
                width: 90px;
                height: 90px;
            }
            .song-title { font-size: 0.9rem; margin-bottom: 0.2rem; }
            .song-artist { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <!-- Beautiful Fullscreen Background -->
    <div class="fullscreen-bg"></div>
    <div class="overlay"></div>

    <div class="content">
        <h1 class="title">Stuck in my head...</h1>
        <a href="yes.html" class="back-btn">Go Back</a>
    </div>

    <!-- Music Player Widget -->
    <div class="music-widget">
        <div class="album-cover">
            <!-- Using the YouTube video thumbnail as the album cover -->
            <img src="https://img.youtube.com/vi/6_rYJqrju8g/hqdefault.jpg" alt="Album Cover">
            <div class="playing-bars">
                <div class="bar bar1"></div>
                <div class="bar bar2"></div>
                <div class="bar bar3"></div>
            </div>
        </div>
        <div class="song-info">
            <div class="song-title">Mata Denna Lobai</div>
            <div class="song-artist">Gajindu Fonseka</div>
        </div>
    </div>

    <!-- Hidden Audio Player -->
    <audio id="bg-audio" src="assets/song.mp3" preload="auto" loop></audio>
    <div class="play-hint visible" id="playHint">🎵 Tap to play song 🎵</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-audio');
            const hint = document.getElementById('playHint');

            // Attempt to instantly set to 2:08
            try { audio.currentTime = 128; } catch(e) {}
            
            // Guarantee that the moment the song actually manages to buffer and start, 
            // it jumps perfectly to 2:08 if it hadn't already
            audio.addEventListener('playing', () => {
                if (audio.currentTime < 120) {
                    audio.currentTime = 128;
                }
                hint.classList.remove('visible');
            });

            // Play ONLY when user clicks the hint
            hint.addEventListener('click', () => {
                // Instantly apply beautiful vanish animation
                hint.classList.add('vanish-anim');
                
                if (audio.currentTime < 120 && audio.readyState >= 1) {
                    try { audio.currentTime = 128; } catch(e){}
                }
                
                audio.play().catch(e => {
                    console.log("Play failed: ", e);
                    hint.classList.remove('vanish-anim');
                });
            });
        });
    </script>
</body>
</html>
